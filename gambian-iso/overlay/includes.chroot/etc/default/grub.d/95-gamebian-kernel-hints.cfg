# Gamebian: optional kernel cmdline hints (uncomment after reviewing hardware).
# PCIe Active State Power Management affects latency on some boards.
# GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT pcie_aspm=performance"
# amd_pstate defaults vary by kernel — see kernel docs before changing.
# GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT amd_pstate=active"
# Intel P-states (document on https://www.kernel.org/doc/html/latest/admin-guide/pm/intel_pstate.html)
# GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT intel_pstate=disable"
