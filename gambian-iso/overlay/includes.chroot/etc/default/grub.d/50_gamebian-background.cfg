# Full GFX menu: GRUB_BACKGROUND feeds 05_debian_theme (avoids default desktop-grub.png); GRUB_THEME adds
# title + styled menu (00_header). Same artwork as live ISO wallpaper.
GRUB_BACKGROUND=/usr/share/gamebian/branding/grub/wallpaper.png
GRUB_THEME=/usr/share/gamebian/branding/grub/theme.txt
GRUB_GFXMODE=auto
GRUB_TERMINAL_OUTPUT=gfxterm
