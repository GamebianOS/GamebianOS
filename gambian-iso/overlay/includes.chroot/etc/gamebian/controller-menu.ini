# Gamebian controller quick menu — hotkey opens a fullscreen launcher.
# Override per user: ~/.config/gamebian/controller-menu.ini
#
# trigger mode:
#   guide         — Xbox Guide / PS / Mode (BTN_MODE) or KEY_HOMEPAGE
#   select_start  — hold Select, press Start (or the reverse)

[trigger]
mode = guide

# Each "Label = command" appears in the menu (shell one-liner).
[programs]
Steam = steam
Files = thunar
Terminal = xfce4-terminal
Applications = rofi -show drun -show-icons
Browser = x-www-browser
