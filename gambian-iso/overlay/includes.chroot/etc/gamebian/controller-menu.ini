# Gamebian controller quick menu — hotkey opens a fullscreen launcher.
# Override per user: ~/.config/gamebian/controller-menu.ini
#
# trigger mode:
#   guide         — Xbox Guide / PS / Mode (BTN_MODE) or KEY_HOMEPAGE
#   select_start  — hold Select, press Start (or the reverse)
#
# keyboard_super — if true (default), Super / Windows key also opens the menu.
#
# skip_when_steam_running — if true (default), hotkeys do nothing while
#   Steam is already running (avoid popping over Big Picture / gamescope).
#
# [ui] theme: auto (installed = monochrome, live ISO = blue), installed, live
# icon: auto (menu-icon-default.png on disk, menu-icon.png on live), or full path
# title: window / header label (default Gamebian)

[trigger]
mode = guide
keyboard_super = true
skip_when_steam_running = true

[ui]
theme = auto
icon = auto
title = Gamebian

# Each "Label = command" appears in the menu (shell one-liner).
# Steam: exit Openbox and autologin the fullscreen gamescope session (not nested steam).
# Optional [icons] entries override Papirus/desktop lookup (icon theme name or path).
[programs]
Steam = /usr/sbin/gamebian-enter-steam-kiosk-session
Files = thunar
Terminal = xfce4-terminal
Applications = rofi -show drun -show-icons
Browser = x-www-browser

[icons]
Steam = steam
Files = thunar
Terminal = utilities-terminal
Applications = view-grid
Browser = web-browser

# Theme entries are auto-added from ~/.themes:
#   gamebian, gamebian-installed, green, yellow, blue, red, black, purple
[themes]
enabled = true
