# Override Debian live-boot default:
# vanilla theme.cfg pulls in live-theme/theme.txt whenever splash.png exists,
# which applies the pixmap background + GFX menu widgets (often with icons).
#
# Omitting theme= yields the classic cyan/blue text menu on the framebuffer.
set color_normal=light-gray/black
set color_highlight=white/dark-gray
set menu_color_normal=cyan/blue
set menu_color_highlight=white/blue
