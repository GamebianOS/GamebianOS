---
# gamescope: already on the ISO from hook 997 in most builds. If missing, source-build on
# the target (10–40 min). Do not run this in shellprocess@gamebian-sshprep (60s timeout).
dontChroot: false
timeout: 7200

script:
  - command: "mkdir -p /var/log"
  - command: "if command -v gamescope >/dev/null 2>&1 && gamescope --help >/dev/null 2>&1; then echo \"$(date '+%F %T') gamescope already on system: $(command -v gamescope)\" | tee -a /var/log/gamebian-install-gamescope.log; exit 0; fi"
  - command: "echo \"$(date '+%F %T') building gamescope on target…\" | tee -a /var/log/gamebian-install-gamescope.log"
  - command: "GAMEBIAN_GAMESCOPE_GIT_REF=3.16.22 GAMEBIAN_GAMESCOPE_KEEP_SRC=0 /usr/local/sbin/gamebian-install-gamescope >>/var/log/gamebian-install-gamescope.log 2>&1 || true"
  - command: "command -v gamescope >/dev/null 2>&1 && gamescope --help 2>&1 | head -n 1 | tee -a /var/log/gamebian-install-gamescope.log || echo gamescope missing — steam-without-gamescope may be set | tee -a /var/log/gamebian-install-gamescope.log"
