---
# Based on calamares-settings-debian; default autologin for Steam-in-gamescope (HTPC-style; see displaymanager).
# Checkbox still shown so the installer can opt out (uncheck + displaymanager clears autologin).

userGroup:       users
defaultGroups:
    - cdrom
    - floppy
    - sudo
    - audio
    - dip
    - video
    - plugdev
    - netdev
    - lpadmin
    - scanner
    - bluetooth
autologinGroup:  autologin
sudoersGroup:    sudo
setRootPassword: false

displayAutologin: true
doAutologin:      true

# No libpwquality — avoids "Password is too weak" (score < 40) from Calamares/libpwquality.
passwordRequirements:
    minLength: 1
    maxLength: -1
# Allow weak passwords by default; optional UI checkbox can re-enable strength checks.
allowWeakPasswords: true
allowWeakPasswordsDefault: true
