---
# Based on calamares-settings-debian; default autologin for Openbox (HTPC-style).
# Checkbox still shown so the installer can opt out (uncheck + displaymanager clears autologin).

userGroup:       users
defaultGroups:
    - cdrom
    - floppy
    - sudo
    - audio
    - dip
    - video
    - plugdev
    - netdev
    - lpadmin
    - scanner
    - bluetooth
autologinGroup:  autologin
sudoersGroup:    sudo
setRootPassword: false

displayAutologin: true
doAutologin:      true

passwordRequirements:
    nonempty: true
    minLength: -1
    maxLength: -1
    libpwquality:
        - minlen=0
        - minclass=0
