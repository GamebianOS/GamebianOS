---
# LightDM; installed default is Steam-in-gamescope (live ISO still uses Openbox via 88- drop-in).

displaymanagers:
  - lightdm

defaultDesktopEnvironment:
    executable: "/usr/local/bin/gamebian-steam-gamescope-session"
    desktopFile: "gamebian-steam-gamescope"

basicSetup: false
sysconfigSetup: false

lightdm:
  preferred_greeters: ["lightdm-gtk-greeter.desktop", "lightdm-greeter.desktop", "slick-greeter.desktop"]
