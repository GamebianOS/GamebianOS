---
# LightDM — live ISO: Openbox (overlay 88-/50-). Installed disk: Openbox-first (Calamares sshprep 90-…)
# until Steam first-boot runs /usr/sbin/gamebian-enable-steam-lightdm-session, then kiosk gamescope (99-).

displaymanagers:
  - lightdm

defaultDesktopEnvironment:
    executable: "/usr/bin/openbox-session"
    desktopFile: "gamebian-desktop"

basicSetup: false
sysconfigSetup: false

lightdm:
  preferred_greeters: ["lightdm-gtk-greeter.desktop", "lightdm-greeter.desktop", "slick-greeter.desktop"]
