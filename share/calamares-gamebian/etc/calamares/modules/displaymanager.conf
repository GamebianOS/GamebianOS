---
# LightDM — live ISO: autologin user=live (50-gamebian-live-autologin; removed on install).
# Installed disk: autologin-session=gamebian-autologin → gamescope when Steam is installed.

displaymanagers:
  - lightdm

defaultDesktopEnvironment:
    executable: "/usr/bin/openbox-session"
    desktopFile: "gamebian-desktop"

basicSetup: false
sysconfigSetup: false

lightdm:
  preferred_greeters: ["lightdm-gtk-greeter.desktop", "lightdm-greeter.desktop", "slick-greeter.desktop"]
