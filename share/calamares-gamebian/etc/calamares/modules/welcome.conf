---
# Blocks “Next” until storage, RAM, and live internet checks pass (APT + shellprocess
# installers need a reachable Debian mirror). Join Wi‑Fi in the live session first
# (e.g. nm-tray, nm-connection-editor, or nmtui in xfce4-terminal) if you need wireless.

showSupportUrl: false
showKnownIssuesUrl: false
showReleaseNotesUrl: false
showDonateUrl: false

requirements:
  requiredStorage: 10
  requiredRam: 1.5
  # Try several endpoints; Debian paths can differ by suite redirects.
  internetCheckUrl:
    - https://www.debian.org/
    - https://deb.debian.org/
    - https://networkcheck.kde.org/

  check:
    - storage
    - ram
    - internet

  # Must satisfy all of these for the installer to proceed past Welcome.
  required:
    - storage
    - ram
    - internet

geoip:
  style: "none"
