---
# Live images may ship /etc/ssh/sshd_not_to_be_run; remove before enabling units.
# Strip live-only LightDM autologin drop-in; installed system uses main lightdm.conf via displaymanager.
dontChroot: false
timeout: 60

script:
  - command: "rm -f /etc/ssh/sshd_not_to_be_run"
  - command: "rm -f /etc/lightdm/lightdm.conf.d/50-gamebian-live-autologin.conf"
