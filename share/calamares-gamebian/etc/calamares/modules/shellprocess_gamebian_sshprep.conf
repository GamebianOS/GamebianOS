---
# Live images may ship /etc/ssh/sshd_not_to_be_run; remove before enabling units.
# Strip live-only LightDM autologin drop-in.
# Force Openbox-first on disk until Steam first-boot completes, then Steam-in-gamescope (see sshprep writes + /usr/sbin/gamebian-enable-steam-lightdm-session).
# Ensure default host keys exist (avoids "no hostkeys available"); /run/sshd is created at boot via
# /etc/tmpfiles.d/gamebian-sshd.conf on the live/install image.
dontChroot: false
timeout: 60

script:
  - command: "rm -f /etc/ssh/sshd_not_to_be_run"
  - command: "rm -f /etc/lightdm/lightdm.conf.d/50-gamebian-live-autologin.conf"
  # Installed disk: Openbox + Steam terminal first (overrides Calamares displaymanager presets). Steam first-boot swaps to gamescope via gamebian-enable-steam-lightdm-session.
  - command: "rm -f /etc/lightdm/lightdm.conf.d/88-gamebian-openbox-session.conf /etc/lightdm/lightdm.conf.d/99-gamebian-steam-session.conf /etc/lightdm/lightdm.conf.d/90-gamebian-openbox-first-session.conf"
  - command: "printf '%s\\n' '[Seat:*]' 'user-session=openbox' 'autologin-session=openbox' > /etc/lightdm/lightdm.conf.d/90-gamebian-openbox-first-session.conf"
  - command: "chmod 0644 /etc/lightdm/lightdm.conf.d/90-gamebian-openbox-first-session.conf"
  - command: "chmod 0755 /usr/local/bin/gamebian-steam-gamescope-session /usr/local/bin/gamebian-steam-bigpicture 2>/dev/null || true"
  - command: "[ -x /usr/games/gamescope ] && [ ! -e /usr/bin/gamescope ] && ln -sf ../games/gamescope /usr/bin/gamescope || true"
  - command: "[ -x /usr/games/steam ] && [ ! -e /usr/bin/steam ] && ln -sf ../games/steam /usr/bin/steam || true"
  - command: "ssh-keygen -A"
