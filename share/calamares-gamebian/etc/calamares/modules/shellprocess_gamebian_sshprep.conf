---
# Live images may ship /etc/ssh/sshd_not_to_be_run; remove before enabling units.
# Strip live-only LightDM autologin drop-in.
# Installed disk: strip live/legacy LightDM drop-ins; Openbox-first is gamebian-autologin-session + markers
# until /usr/sbin/gamebian-enable-steam-lightdm-session (after steam-firstboot-terminal.sh).
# Ensure default host keys exist (avoids "no hostkeys available"); /run/sshd is created at boot via
# /etc/tmpfiles.d/gamebian-sshd.conf on the live/install image.
dontChroot: false
timeout: 60

script:
  - command: "rm -f /etc/ssh/sshd_not_to_be_run"
  - command: "rm -f /etc/lightdm/lightdm.conf.d/50-gamebian-live-autologin.conf"
  # Installed disk: keep 98-gamebian-autologin.conf; autologin dispatcher Openbox first, then gamescope.
  - command: "rm -f /etc/lightdm/lightdm.conf.d/88-gamebian-openbox-session.conf /etc/lightdm/lightdm.conf.d/99-gamebian-steam-session.conf /etc/lightdm/lightdm.conf.d/90-gamebian-openbox-first-session.conf /etc/lightdm/lightdm.conf.d/97-gamebian-autologin-steam.conf /etc/lightdm/lightdm.conf.d/99-gamebian-autologin-steam.conf"
  - command: "chmod 0755 /usr/local/bin/gamebian-lightdm-session /usr/local/bin/gamebian-steam-gamescope-session /usr/local/bin/gamebian-steam-bigpicture 2>/dev/null || true"
  - command: "chmod 0755 /usr/local/bin/gamebian-debug-boot-session /usr/local/bin/gamebian-debug-lightdm-steam /usr/local/bin/gamebian-autologin-session /usr/local/bin/gamebian-fix-steam-boot /usr/share/gamebian/gamebian-openbox-notify.sh /usr/share/gamebian/gamebian-steam-reboot-notice.sh /usr/share/gamebian/gamebian-openbox-tips-notice.sh /usr/share/gamebian/gamebian-installed-openbox-notice.sh 2>/dev/null || true"
  - command: "chmod 0644 /usr/share/gamebian/gamebian-session-log.sh /etc/lightdm/lightdm.conf.d/10-gamebian-lightdm-debug.conf 2>/dev/null || true"
  - command: "chmod 0644 /usr/share/gamebian/gamebian-steam-ready.sh 2>/dev/null || true"
  - command: "chmod 0644 /usr/share/gamebian/xsessions/*.desktop 2>/dev/null || true"
  - command: "chmod 0755 /usr/sbin/gamebian-enter-steam-kiosk-session 2>/dev/null || true"
  - command: "[ -x /usr/games/gamescope ] && [ ! -e /usr/bin/gamescope ] && ln -sf ../games/gamescope /usr/bin/gamescope || true"
  - command: "[ -x /usr/games/steam ] && [ ! -e /usr/bin/steam ] && ln -sf ../games/steam /usr/bin/steam || true"
  - command: "ssh-keygen -A"
