backend: apt

update_db: true
update_system: false

operations:
  - try_remove:
      - live-boot-initramfs-tools
      - qml-module-qtquick-controls2
      - plymouth
      - plymouth-label
      - plymouth-themes
      - plymouth-x11
  - remove:
      - live-boot
      - live-boot-doc
      - live-config
      - live-config-doc
      - live-config-systemd
      - live-tools
      - live-task-localisation
      - live-task-recommended
      - calamares-settings-debian
      - calamares
  # Steam is baked into the live squashfs (openbox.list.chroot); SSH into target after install — ensure present.
  - try_install:
      - steam-installer
      - openssh-server
      - openssh-client
