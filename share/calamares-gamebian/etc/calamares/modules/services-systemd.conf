---
# Debian trixie+ uses socket activation; avoid enabling ssh.socket and ssh.service together (port 22 bind clash).
units:
  - name: ssh.socket
    action: enable
    mandatory: false
  # Blueman needs org.bluez (bluetoothd). Debian often ships the unit disabled; enable on target installs.
  - name: bluetooth.service
    action: enable
    mandatory: false
