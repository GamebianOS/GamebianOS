---
# Calamares shellprocess: install gamebian-web as a utility on the target system.
#
# This runs *only* during installation (Calamares); the live ISO keeps gamebian-web
# source under /usr/src/gamebian-web (staged by gambian-iso/setup.sh from
# <repo>/Packages/gamebian-web) but
# never installs or enables it. This module materialises it on the installed disk.

dontChroot: false
timeout: 900

script:
  - command: "/usr/local/sbin/gamebian-web-install"
    timeout: 900
