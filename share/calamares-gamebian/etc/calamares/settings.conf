# Configuration file for Calamares
# Syntax is YAML 1.2
# Derived from calamares-settings-debian; branding points at Gamebian overlay.
---

modules-search: [ local, /usr/lib/calamares/modules ]

# Named shellprocess instances; sequence references ids below.
instances:
- id: gamebian-sshprep
  module: shellprocess
  config: shellprocess_gamebian_sshprep.conf
- id: gamebian-web
  module: shellprocess
  config: shellprocess_gamebian_web.conf

oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
quit-at-end: false

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - luksbootkeyfile
  - dpkg-unsafe-io
  - sources-media
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - bootloader-config
  # Write http mirror (sources.list). Does NOT remove debian-live-media.list — see below.
  - sources-final
  # Removes etc/apt/sources.list.d/debian-live-media.list (file:/run/live/medium/…) and
  # umounts the bind-mount; MUST run before `packages` or apt-get update still hits file:.
  - sources-media-unmount
  - packages
  - shellprocess@gamebian-sshprep
  - services-systemd
  - grubcfg
  - bootloader
  - initramfscfg
  - initramfs
  - dpkg-unsafe-io-undo
  # Install gamebian-web (web-based remote install/manage tool) on the target.
  # Source is staged at /usr/src/gamebian-web by the live-build setup; this
  # shellprocess installs it via pip + apt and enables its systemd units.
  # The live ISO never enables or runs gamebian-web.
  - shellprocess@gamebian-web
  - umount
- show:
  - finished

branding: gamebian

prompt-install: false
dont-chroot: false
