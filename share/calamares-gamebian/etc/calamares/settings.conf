# Configuration file for Calamares
# Syntax is YAML 1.2
# Derived from calamares-settings-debian; branding points at Gamebian overlay.
---

modules-search: [ local, /usr/lib/calamares/modules ]

# Declare named instances of generic modules (currently only shellprocess) so
# the sequence can reference them by id.
instances:
- id: gamebian-web
  module: shellprocess
  config: shellprocess_gamebian_web.conf

oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
quit-at-end: false

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - luksbootkeyfile
  - dpkg-unsafe-io
  - sources-media
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - bootloader-config
  - packages
  - grubcfg
  - bootloader
  - initramfscfg
  - initramfs
  - dpkg-unsafe-io-undo
  - sources-media-unmount
  # Final apt sources (mirror) must exist before gamebian-web-install: otherwise
  # apt still points at file:/run/live/medium/…/binary-i386 (missing on amd64 ISOs).
  - sources-final
  # Install gamebian-web (web-based remote install/manage tool) on the target.
  # Source is staged at /usr/src/gamebian-web by the live-build setup; this
  # shellprocess installs it via pip + apt and enables its systemd units.
  # The live ISO never enables or runs gamebian-web.
  - shellprocess@gamebian-web
  - umount
- show:
  - finished

branding: gamebian

prompt-install: false
dont-chroot: false
